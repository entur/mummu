name: Build, push and deploy
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  maven-verify:
    env:
      JFROG_USER: ${{ secrets.ARTIFACTORY_AUTH_USER }}
      JFROG_PASS: ${{ secrets.ARTIFACTORY_AUTH_TOKEN }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Copy maven settings
        run: |
          wget https://raw.githubusercontent.com/entur/ror-maven-settings/master/.m2/settings.xml -O .github/workflows/settings.xml
      - uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
      - name: Cache Maven dependencies
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
            ${{ runner.os }}-maven-
            ${{ runner.os }}-

      - name: Run maven build
        run: mvn verify -s .github/workflows/settings.xml

      - name: Check OpenAPI spec is up-to-date
        run: |
          if git diff --exit-code src/main/resources/public/openapi.json; then
            echo "OpenAPI spec is up-to-date"
          else
            echo "Error: OpenAPI spec has changes. Please run 'mvn verify' locally and commit the updated openapi.json file."
            exit 1
          fi

      - name: Check for breaking API changes
        if: github.event_name == 'pull_request'
        uses: oasdiff/oasdiff-action/breaking@v0.0.37
        with:
          base: 'origin/${{ github.base_ref }}:src/main/resources/public/openapi.json'
          revision: 'HEAD:src/main/resources/public/openapi.json'
          fail-on: ERR

      - name: Sonar Scan
        env:
          SONAR_TOKEN: ${{ secrets.ENTUR_SONAR_PASSWORD }}
          SONAR_PROJECT_NAME: ${{ github.event.repository.name }}
          SONAR_PROJECT_KEY: entur_${{ github.event.repository.name }}
        run: |
          mvn -s .github/workflows/settings.xml \
                  org.jacoco:jacoco-maven-plugin:prepare-agent verify \
                  org.jacoco:jacoco-maven-plugin:report sonar:sonar \
                  -Dmaven.main.skip \
                  -DskipTests \
                  -Dsonar.projectKey=${SONAR_PROJECT_KEY} \
                  -Dsonar.organization=enturas-github \
                  -Dsonar.projectName=${SONAR_PROJECT_NAME} \
                  -Dsonar.host.url=https://sonarcloud.io \
                  -Dsonar.token=${SONAR_TOKEN}
      - uses: actions/upload-artifact@v4.6.2
        with:
          name: target
          path: target
      - uses: actions/upload-artifact@v4.6.2
        with:
          name: apispec
          path: src/main/resources/public/openapi.json

  openapi-lint:
    needs: [maven-verify]
    uses: entur/gha-api/.github/workflows/lint.yml@v4
    secrets: inherit
    with:
      artifact: apispec
      artifact_contents: openapi.json
      upload_to_bucket: ${{ github.repository_owner == 'entur' && github.event_name == 'push' && github.ref == 'refs/heads/master' }}

  openapi-publish:
    if: github.repository_owner == 'entur' && github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [ openapi-lint ]
    uses: entur/gha-api/.github/workflows/publish.yml@v4
    secrets: inherit
    with:
      visibility: 'public'
      spec: 'src/main/resources/public/openapi.json'

  docker-build:
    if: github.repository_owner == 'entur' && github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [maven-verify]
    uses: entur/gha-docker/.github/workflows/build.yml@v1
    with:
      build_artifact_name: target
      build_artifact_path: target
  docker-scan:
    needs: [ docker-build ]
    uses: entur/gha-security/.github/workflows/docker-scan.yml@v2
    with:
      image_artifact: ${{ needs.docker-build.outputs.image_artifact }}
  docker-push:
    needs: [docker-build]
    uses: entur/gha-docker/.github/workflows/push.yml@v1

  helm-lint:
    uses: entur/gha-helm/.github/workflows/lint.yml@v1
    with:
      environment: dev


  deploy-dev:
    if: ${{ github.ref == 'refs/heads/master' && github.event_name != 'pull_request' }}
    needs: [ helm-lint, docker-push ]
    uses: entur/gha-helm/.github/workflows/deploy.yml@v1
    with:
      environment: dev
      image: ${{ needs.docker-push.outputs.image_name }}:${{ needs.docker-push.outputs.image_tag}}
      chart: helm/mummu
      namespace: mummu
      release_name: mummu
    secrets: inherit

  approval-tst:
    if: ${{ github.ref == 'refs/heads/master' }}
    needs: deploy-dev
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: Approve
    steps:
      - name: Manual approval
        shell: bash
        run: echo "Approve TST deployment"

  deploy-tst:
    if: ${{ github.ref == 'refs/heads/master' }}
    needs: [ docker-push, approval-tst ]
    uses: entur/gha-helm/.github/workflows/deploy.yml@v1
    with:
      environment: tst
      image: ${{ needs.docker-push.outputs.image_name }}:${{ needs.docker-push.outputs.image_tag}}
      chart: helm/mummu
      namespace: mummu
      release_name: mummu
    secrets: inherit

  approval-prd:
    if: ${{ github.ref == 'refs/heads/master' }}
    needs: deploy-tst
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: Approve
    steps:
      - name: Manual approval
        shell: bash
        run: echo "Approve PRD deployment"

  deploy-prd:
    if: ${{ github.ref == 'refs/heads/master' }}
    needs: [ docker-push, approval-prd ]
    uses: entur/gha-helm/.github/workflows/deploy.yml@v1
    with:
      environment: prd
      image: ${{ needs.docker-push.outputs.image_name }}:${{ needs.docker-push.outputs.image_tag}}
      chart: helm/mummu
      namespace: mummu
      release_name: mummu
    secrets: inherit